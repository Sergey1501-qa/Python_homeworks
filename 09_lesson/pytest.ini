[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

markers =
    db: Тесты базы данных
    crud: CRUD операции
    positive: Позитивные тесты
    negative: Негативные тесты

log_cli = true
log_cli_level = INFO
addopts = -v --tb=short